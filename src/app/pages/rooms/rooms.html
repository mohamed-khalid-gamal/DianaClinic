<app-page-header
  title="Rooms"
  subtitle="Manage clinic rooms and facilities">
  <button class="btn btn-outline" (click)="openRoomTypeModal()">
    <i class="fa-solid fa-tags"></i> Manage Room Types
  </button>
  <button class="btn btn-primary" (click)="openAddModal()">
    + Add Room
  </button>
</app-page-header>

<div class="page-loading" *ngIf="loading" aria-live="polite">
  <div class="spinner"></div>
  <span class="loading-text">Loading rooms...</span>
</div>

<app-data-table
  *ngIf="!loading"
  [data]="rooms"
  [columns]="columns"
  (edit)="openEditModal($event)"
  (delete)="deleteRoom($event)">
</app-data-table>

<app-modal
  [isOpen]="showModal"
  [title]="isEditMode ? 'Edit Room' : 'Add New Room'"
  [confirmDisabled]="saving"
  (closed)="closeModal()"
  (confirmed)="saveRoom(roomFormRef)">

  <form #roomFormRef="ngForm" class="form-grid">
    <div class="form-group">
      <label>Room Name *</label>
      <input type="text" name="roomName" required minlength="2" [(ngModel)]="roomForm.name" placeholder="e.g., Laser Suite 1" #roomName="ngModel">
      <span class="error-text" *ngIf="roomName.invalid && (roomName.touched || roomName.dirty)">
        <span *ngIf="roomName.errors?.['required']">Room name is required</span>
        <span *ngIf="roomName.errors?.['minlength']">Room name must be at least 2 characters</span>
      </span>
    </div>

    <div class="form-group">
      <label>Room Type *</label>
      <select name="roomType" required [(ngModel)]="roomForm.type" #roomType="ngModel">
        <option value="">Select type</option>
        <option *ngFor="let type of roomTypes" [value]="type.name" [hidden]="type.name.toLowerCase() === 'storage'">
          {{ type.name | titlecase }}
        </option>
      </select>
      <span class="error-text" *ngIf="roomType.invalid && (roomType.touched || roomType.dirty)">Room type is required</span>
    </div>

    <div class="form-group">
      <label>Floor</label>
      <input type="text" name="floor" [(ngModel)]="roomForm.floor" placeholder="e.g., 1, Ground">
    </div>

    <div class="form-group">
      <label>Capacity</label>
      <input type="number" name="capacity" [(ngModel)]="roomForm.capacity" min="1" max="10" #capacity="ngModel">
      <span class="error-text" *ngIf="capacity.invalid && (capacity.touched || capacity.dirty)">Capacity must be between 1 and 10</span>
    </div>

    <div class="form-group full-width">
      <label>Equipment</label>
      <app-tag-input [(tags)]="roomForm.equipment" tagClass="primary" placeholder="Add equipment (e.g. Laser) and press Enter"></app-tag-input>
      <span class="hint-text">Press Enter or type comma to add equipment</span>
    </div>

    <div class="form-group">
      <label>Status</label>
      <select name="status" [(ngModel)]="roomForm.isActive">
        <option [ngValue]="true">Available</option>
        <option [ngValue]="false">Unavailable</option>
      </select>
    </div>
  </form>
</app-modal>

<!-- Room Type Management Modal -->
<app-modal
  [isOpen]="showRoomTypeModal"
  title="Manage Room Types"
  maxWidth="550px"
  (closed)="closeRoomTypeModal()"
  [showFooter]="false">

  <div class="category-manager">
    <div class="category-add-form">
      <input type="text" [(ngModel)]="newRoomTypeName" placeholder="New room type..." class="category-input" minlength="2">
      <button class="btn btn-primary btn-sm" (click)="addNewRoomType()" [disabled]="!newRoomTypeName.trim() || newRoomTypeName.trim().length < 2">
        <i class="fa-solid fa-plus"></i> Add
      </button>
    </div>
    <span class="error-text" *ngIf="newRoomTypeName.trim().length > 0 && newRoomTypeName.trim().length < 2">Name must be at least 2 characters</span>

    <div class="category-list" *ngIf="roomTypes.length; else noTypes">
      <div class="category-item" *ngFor="let rt of roomTypes">
        <div class="category-info" *ngIf="editingRoomTypeId !== rt.id">
          <span class="cat-name">{{ rt.name }}</span>
        </div>
        <div class="category-edit" *ngIf="editingRoomTypeId === rt.id">
          <input type="text" [(ngModel)]="editingRoomTypeName" class="category-input">
        </div>
        <div class="category-actions">
          <button *ngIf="editingRoomTypeId !== rt.id" class="btn btn-outline btn-sm" (click)="startEditRoomType(rt)">
            <i class="fa-solid fa-pen"></i>
          </button>
          <button *ngIf="editingRoomTypeId === rt.id" class="btn btn-primary btn-sm" (click)="saveRoomType(rt)">
            <i class="fa-solid fa-check"></i>
          </button>
          <button *ngIf="editingRoomTypeId === rt.id" class="btn btn-outline btn-sm" (click)="cancelEditRoomType()">
            <i class="fa-solid fa-xmark"></i>
          </button>
          <button *ngIf="editingRoomTypeId !== rt.id" class="btn btn-outline btn-sm btn-danger" (click)="deleteRoomType(rt)">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>
      </div>
    </div>
    <ng-template #noTypes>
      <div class="empty-state"><p>No room types yet. Add one above.</p></div>
    </ng-template>
  </div>
</app-modal>
